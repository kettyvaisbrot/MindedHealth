<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ patient.user.username }} - Detail</title>
</head>
<body>
    <h1>{{ patient.user.username }}</h1>

    <p>
        <a href="{% url 'my_statistics:statistics_view' %}?patient_id={{ patient.id }}">
            <button>View Statistics</button>
        </a>
    </p>

    {% if patient.family_member %}
        <p>
            <a href="{% url 'family_dashboard' patient.family_member.id %}">
                <button>Family Member</button>
            </a>
        </p>
    {% else %}
        <p>No family member assigned yet.</p>
    {% endif %}

    <p><a href="{% url 'therapist_dashboard' %}">← Back to Dashboard</a></p>
</body>
</html>
